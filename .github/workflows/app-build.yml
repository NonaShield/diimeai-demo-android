# =============================================================================
# NonaShield Demo App — Build APK
# =============================================================================
#
# Triggers on push to main when app source files change.
# Steps:
#   1. Check out demo app repo
#   2. Build debug APK — SDK AAR resolved from app/libs/ (flatDir, no SDK source needed)
#   3. Upload APK as a GitHub Actions artifact
#
# The SDK AAR (app/libs/payshield-android-sdk-1.0.0.aar) is committed to this
# repo. To update the SDK: download the new AAR from the nonashield-sdk CI
# artifacts and replace the file, then commit.
#
# Optional secrets (for Play Store / signed release builds):
#   DIIMEAI_KEYSTORE_BASE64  — base64-encoded keystore (base64 -w0 diimeai.keystore)
#   DIIMEAI_STORE_PASSWORD   — keystore password
#   DIIMEAI_KEY_ALIAS        — key alias
#   DIIMEAI_KEY_PASSWORD     — key password
# =============================================================================

name: Build App

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - "gradle.properties"
      - ".github/workflows/app-build.yml"
  workflow_dispatch:

concurrency:
  group: app-build
  cancel-in-progress: true

jobs:

  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Build debug APK
        env:
          DEMO_API_KEY: "ABCDEFGHI"
        run: |
          chmod +x gradlew
          echo "── Building APK (SDK AAR from app/libs/, DEMO_API_KEY=ABCDEFGHI)..."
          ./gradlew :app:assembleDebug \
            --warning-mode none \
            --no-daemon
          echo "✓ APK built"

      - name: Verify APK exists
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          if [[ ! -f "$APK" ]]; then
            echo "✗ APK not found at $APK"
            ls -la app/build/outputs/apk/ 2>/dev/null || true
            exit 1
          fi
          SIZE=$(stat -c%s "$APK")
          echo "✓ APK: $APK (${SIZE} bytes)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nonashield-demo-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      # ── Optional: signed release APK (only when keystore secrets are set) ──
      - name: Build signed release APK
        if: ${{ env.DIIMEAI_KEYSTORE_BASE64 != '' }}
        env:
          DEMO_API_KEY: "ABCDEFGHI"
          DIIMEAI_KEYSTORE_BASE64: ${{ secrets.DIIMEAI_KEYSTORE_BASE64 }}
          DIIMEAI_STORE_PASSWORD:  ${{ secrets.DIIMEAI_STORE_PASSWORD }}
          DIIMEAI_KEY_ALIAS:       ${{ secrets.DIIMEAI_KEY_ALIAS }}
          DIIMEAI_KEY_PASSWORD:    ${{ secrets.DIIMEAI_KEY_PASSWORD }}
        run: |
          echo "$DIIMEAI_KEYSTORE_BASE64" | base64 -d > /tmp/diimeai.keystore
          export DIIMEAI_KEYSTORE_PATH=/tmp/diimeai.keystore
          ./gradlew :app:assembleRelease --warning-mode none --no-daemon
          echo "✓ Signed release APK built"
          rm -f /tmp/diimeai.keystore

      - name: Upload signed APK artifact
        if: ${{ env.DIIMEAI_KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: nonashield-release-apk-${{ github.sha }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: warn
        env:
          DIIMEAI_KEYSTORE_BASE64: ${{ secrets.DIIMEAI_KEYSTORE_BASE64 }}

      - name: Print build summary
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          echo "  App Build Summary"
          echo "════════════════════════════════════════════"
          echo "  Commit    : ${{ github.sha }}"
          echo "  Branch    : ${{ github.ref_name }}"
          echo "  By        : ${{ github.actor }}"
          echo "  API Key   : ABCDEFGHI (embedded in APK)"
          echo "  API URL   : https://api.diimeai.com"
          echo "  Artifact  : nonashield-demo-apk-${{ github.sha }}"
          echo "════════════════════════════════════════════"
