name: Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'debug'
        type: choice
        options: [ debug, release ]

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build:
    name: Build ${{ github.event.inputs.build_type || 'debug' }} APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java 17 ──────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      # ── Gradle cache ─────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── Verify SDK AAR is bundled ─────────────────────────────────────────────
      - name: Verify SDK AAR
        run: |
          AAR="app/libs/payshield-android-sdk-1.0.0.aar"
          if [ -f "$AAR" ]; then
            echo "SDK AAR: $(du -h "$AAR" | cut -f1)"
          else
            echo "ERROR: $AAR not found — should be committed to app/libs/"
            exit 1
          fi

      # ── Debug build ───────────────────────────────────────────────────────────
      - name: Build debug APK
        if: github.event.inputs.build_type != 'release'
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace
        env:
          DEMO_API_KEY: ${{ secrets.DEMO_API_KEY }}

      # ── Release build ─────────────────────────────────────────────────────────
      - name: Build release APK
        if: github.event.inputs.build_type == 'release'
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace
        env:
          DEMO_API_KEY: ${{ secrets.DEMO_API_KEY }}
          DIIMEAI_KEYSTORE_PATH: ${{ secrets.DIIMEAI_KEYSTORE_PATH }}
          DIIMEAI_STORE_PASSWORD: ${{ secrets.DIIMEAI_STORE_PASSWORD }}
          DIIMEAI_KEY_ALIAS: ${{ secrets.DIIMEAI_KEY_ALIAS }}
          DIIMEAI_KEY_PASSWORD: ${{ secrets.DIIMEAI_KEY_PASSWORD }}
          PAYSHIELD_EXPECTED_CERT_HASH: ${{ secrets.PAYSHIELD_EXPECTED_CERT_HASH }}

      # ── Show APK size ─────────────────────────────────────────────────────────
      - name: APK details
        if: always()
        run: |
          find app/build/outputs/apk -name "*.apk" 2>/dev/null | while read f; do
            echo "$(du -h "$f" | cut -f1)  $f"
          done || echo "No APK found"

      # ── Upload debug APK ──────────────────────────────────────────────────────
      - name: Upload debug APK
        if: github.event.inputs.build_type != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: diimeai-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      # ── Upload release APK ────────────────────────────────────────────────────
      - name: Upload release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: diimeai-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
